<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX ATHLETICS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="json/manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="apple-touch-icon" href="img/icon.png">
    
    <script src="js/sw.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="top-gradient"></div>
    
    <header class="main-header">
        <button id="profile-btn" class="profile-btn-floating">
            <i class="fas fa-user-circle"></i> <span class="profile-text">Acceso Usuario</span>
        </button>

        <h1>APEX<span>ATHLETICS</span></h1>
        <p id="event-count">Cargando competiciones...</p>
        <div id="auth-message" class="auth-message" style="display: none;"></div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Buscar por evento, ciudad o país...">
        </div>
    </header>

    <nav class="filter-navigation">
        <div class="filter-wrapper">
            <div class="custom-select">
                <i class="fas fa-calendar-alt"></i>
                <select id="filter-month">
                    <option value="all">Cualquier Mes</option>
                    <option value="01">Enero</option>
                    <option value="02">Febrero</option>
                    <option value="03">Marzo</option>
                    <option value="04">Abril</option>
                    <option value="05">Mayo</option>
                    <option value="06">Junio</option>
                    <option value="07">Julio</option>
                    <option value="08">Agosto</option>
                    <option value="09">Septiembre</option>
                    <option value="10">Octubre</option>
                    <option value="11">Noviembre</option>
                    <option value="12">Diciembre</option>
                </select>
            </div>
            <div class="custom-select">
                <i class="fas fa-running"></i>
                <select id="filter-discipline">
                    <option value="all">Todas las pruebas</option>
                </select>
            </div>

            <div class="custom-select">
                <i class="fas fa-globe-americas"></i>
                <select id="filter-continent">
                    <option value="all">Continentes</option>
                </select>
            </div>
     
            <div class="custom-select">
                <i class="fas fa-globe-europe"></i>
                <select id="filter-country">
                    <option value="all">Países</option>
                </select>
            </div>

            <div class="custom-select">
                <i class="fas fa-layer-group"></i>
                <select id="filter-level">
                    <option value="all">Niveles</option>
                </select>
            </div>

            <div class="gender-pill">
                <button class="g-btn active" data-gender="all">Todos</button>
                <button class="g-btn" data-gender="🚹">🚹 M</button>
                <button class="g-btn" data-gender="🚺">🚺 F</button>
            </div>

            <div class="custom-select">
                <i class="fas fa-calendar-alt"></i>
                <input type="text" id="date-range" placeholder="Filtrar por fechas...">
                <i class="fas fa-times" id="clear-date" style="display: none; cursor: pointer; margin-left: 10px; color: #ff4d4d;"></i>
            </div>
        </div>
    </nav>

    <main id="event-grid" class="event-grid">
    </main>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal"><i class="fas fa-times"></i></button>
            <div class="modal-header">
                <span id="modal-date-tag" class="card-date"></span>
                <h2 id="modal-title"></h2>
                <p id="modal-location" class="location-info"></p>
            </div>
            <div class="modal-action-bar" style="padding: 0 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;">
                <button id="btn-manage-trip" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: #0070f3; color: white; padding: 14px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 14px 0 rgba(0,112,243,0.39);">
                    <i class="fas fa-plane-departure"></i> Gestionar competicion
                </button>
            </div>
            <div class="modal-body">
                <div class="info-section">
                    <h4><i class="fas fa-info-circle"></i> Información del Evento</h4>
                    <p><strong>Área:</strong> <span id="modal-area"></span></p>
                    <p><strong>Categoría:</strong> <span id="modal-cat"></span></p>
                    <p><strong>Pruebas:</strong> <span id="modal-vault"></span></p>
                </div>
                <div class="info-section" id="links-section">
                    <h4><i class="fas fa-link"></i> Enlaces oficiales</h4>
                    <div id="modal-links" class="link-buttons"></div>
                </div>
                <div class="info-section">
                    <h4><i class="fas fa-user-friends"></i> Contacto</h4>
                    <div id="modal-contacts"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content login-box">
            <button id="close-login"><i class="fas fa-times"></i></button>
            
            <div id="login-view">
                <div class="login-header">
                    <i class="fas fa-user-shield"></i>
                    <h2>Portal Mánager</h2>
                    <p>Accede para gestionar tus atletas</p>
                </div>
                <form id="login-form">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Correo electrónico" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Contraseña" required>
                    </div>
                    <button type="submit" class="auth-btn">Iniciar Sesión</button>
                </form>
                <p class="auth-switch">¿No tienes cuenta? <a href="#" id="go-to-signup">Regístrate gratis</a></p>
            </div>

            <div id="signup-view" style="display: none;">
                <div class="login-header">
                    <i class="fas fa-user-plus"></i>
                    <h2>Nueva Cuenta</h2>
                    <p>Únete a la élite del atletismo</p>
                </div>
                <form id="signup-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signup-name" placeholder="Nombre completo / Agencia" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="Correo electrónico" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-password" placeholder="Crea una contraseña (mín. 6 caracteres)" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user-tag"></i>
                        <select id="signup-role" class="auth-select">
                            <option value="manager">Soy Representante</option>
                            <option value="athlete">Soy Atleta</option>
                        </select>
                    </div>
                    <button type="submit" class="auth-btn">Crear Cuenta</button>
                </form>
                <p class="auth-switch">¿Ya eres miembro? <a href="#" id="go-to-login">Inicia sesión</a></p>
            </div>

            <div id="auth-error" class="error-msg" style="display: none;"></div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>

</html>
