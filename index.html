<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV COMPES 2026 | Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="icon.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
    <div class="top-gradient"></div>
    
    <header class="main-header">
        <h1>PV<span>COMPES 2026</span></h1>
        <p id="event-count">Cargando base de datos mundial...</p>
        
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Buscar mitin, ciudad o estadio...">
        </div>
    </header>

    <nav class="filter-navigation">
        <div class="filter-wrapper">
            <div class="custom-select">
                <i class="fas fa-running"></i>
                <select id="filter-discipline">
                    <option value="all">Todas las Pruebas</option>
                </select>
            </div>

            <div class="custom-select">
                <i class="fas fa-calendar-alt"></i>
                <select id="filter-month">
                    <option value="all">Cualquier Mes</option>
                </select>
            </div>

            <div class="custom-select">
                <i class="fas fa-globe-europe"></i>
                <select id="filter-country">
                    <option value="all">Países</option>
                </select>
            </div>

            <div class="custom-select">
                <i class="fas fa-layer-group"></i>
                <select id="filter-level">
                    <option value="all">Niveles WA</option>
                </select>
            </div>

            <div class="gender-pill">
                <button class="g-btn active" data-gender="all">Todos</button>
                <button class="g-btn" data-gender="Men">🚹 M</button>
                <button class="g-btn" data-gender="Women">🚺 F</button>
            </div>
        </div>
    </nav>

    <main id="event-grid" class="event-grid"></main>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal"><i class="fas fa-times"></i></button>
            
            <div class="modal-header">
                <span id="modal-date-tag" class="card-date"></span>
                <h2 id="modal-title"></h2>
                <p id="modal-location" class="location-info"></p>
            </div>

            <div class="modal-body">
                <div class="info-section">
                    <h4><i class="fas fa-list-check"></i> Pruebas Confirmadas</h4>
                    <div id="modal-disciplines" class="discipline-container"></div>
                </div>

                <div class="info-section">
                    <h4><i class="fas fa-info-circle"></i> Detalles Técnicos</h4>
                    <div class="details-grid">
                        <p><strong>Área:</strong> <span id="modal-area"></span></p>
                        <p><strong>Categoría:</strong> <span id="modal-cat"></span></p>
                    </div>
                </div>

                <div class="info-section">
                    <h4><i class="fas fa-link"></i> Enlaces y Logística</h4>
                    <div id="modal-links" class="link-buttons"></div>
                </div>

                <div class="info-section">
                    <h4><i class="fas fa-envelope"></i> Contacto Organización</h4>
                    <div id="modal-contacts"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
