<!-- ============================================================
     CSS — añade esto a tu style.css (o en un bloque <style>)
     ============================================================ -->
<style>
/* --- COMBOBOX BASE --- */
.cb-wrapper {
    position: relative;  /* Ancla el dropdown */
}

.cb-wrapper input {
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: text;
    min-width: 100px;
    max-width: 160px;
}

.cb-wrapper input::placeholder {
    color: #aaa;
}

/* Dropdown lista */
.cb-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    min-width: 200px;
    max-height: 260px;
    overflow-y: auto;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    z-index: 9999;
    padding: 6px;
    list-style: none;
    margin: 0;
    scrollbar-width: thin;
    scrollbar-color: #30363d transparent;
}

.cb-dropdown li {
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
}

.cb-dropdown li:hover,
.cb-dropdown li.cb-hover {
    background: rgba(0, 112, 243, 0.2);
    color: #fff;
}

.cb-dropdown li.cb-active {
    color: #0070f3;
    background: rgba(0, 112, 243, 0.1);
}

/* --- INDICADOR DE SCROLL LATERAL (solo móvil) --- */
.filter-scroll-hint {
    display: none; /* oculto en desktop */
}

@media (max-width: 767px) {
    .filter-scroll-hint {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        width: 48px;
        background: linear-gradient(to right, transparent, rgba(5,5,5,0.95) 60%);
        pointer-events: none;
        z-index: 10;
        animation: hintPulse 2s ease-in-out infinite;
        transition: opacity 0.4s;
    }

    .filter-scroll-hint i {
        color: var(--accent);
        font-size: 0.85rem;
        opacity: 0.9;
    }

    /* Cuando el usuario ya ha scrolleado, se oculta */
    .filter-scroll-hint.hidden {
        opacity: 0;
        pointer-events: none;
    }
}

@keyframes hintPulse {
    0%, 100% { transform: translateX(0); opacity: 0.9; }
    50%       { transform: translateX(3px); opacity: 0.5; }
}

/* La nav necesita position: relative para que el hint se posicione bien */
.filter-navigation {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(5, 5, 5, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    /* ← añade esto: */
    position: sticky; /* ya estaba */
    /* Asegura que el hint se posicione dentro */
    overflow: hidden; /* solo en móvil se necesita para el fade, ver abajo */
}

@media (max-width: 767px) {
    .filter-navigation {
        overflow: visible; /* el dropdown necesita salir */
        position: sticky;
    }
    /* Wrapper relativo para el hint */
    .filter-navigation > * {
        position: relative;
    }
}
</style>


<!-- ============================================================
     JS PARA EL INDICADOR DE SCROLL — añade esto justo antes
     del cierre </body> o al final de app.js
     ============================================================ -->
<script>
(function() {
    const wrapper = document.getElementById('filter-wrapper');
    const hint    = document.getElementById('filter-scroll-hint');
    if (!wrapper || !hint) return;

    wrapper.addEventListener('scroll', function() {
        // Si el user ha scrolleado más de 30px, ocultamos el hint
        if (wrapper.scrollLeft > 30) {
            hint.classList.add('hidden');
        } else {
            hint.classList.remove('hidden');
        }
    }, { passive: true });
})();
</script>
