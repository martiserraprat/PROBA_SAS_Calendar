<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Manager | APEX ATHLETICS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="dashboard.js"></script>
    <link rel="stylesheet" href="ajustes.css">
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">APEX<span>ATHLETICS</span></div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active"><i class="fas fa-user-friends"></i> Atletas</a>
                <a href="../index.html" class="nav-item"><i class="fas fa-search-location"></i> Buscar Mítines</a>
                <a href="#" class="nav-item"><i class="fas fa-file-signature"></i> Inscripciones</a>
                <a href="ajustes.html" class="nav-item"><i class="fas fa-cog"></i> Ajustes</a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-pill">
                    <img src="https://ui-avatars.com/api/?name=M&background=0070f3&color=fff" alt="Avatar" id="user-avatar">
                    <div class="user-info">
                        <span class="user-name">Cargando...</span>
                        <span class="user-role">...</span>
                    </div>
                    <i class="fas fa-sign-out-alt" id="logout-btn"></i>
                </div>
            </div>
        </aside>

        <main class="main-viewport">
            <div class="mobile-header">
                <div class="logo">APEX<span>ATHLETICS</span></div>
                <button id="menu-toggle"><i class="fas fa-bars"></i></button>
            </div>

            <header class="view-header">
                <div class="header-text">
                    <h1>Gestión de Atletas</h1>
                    <p>Panel de control de representados</p>
                </div>
                <div class="header-actions">
                    <button class="btn-primary"><i class="fas fa-plus"></i> Añadir Atleta</button>
                </div>
            </header>

            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-label">Atletas Activos</span>
                    <span class="stat-value" id="stat-count">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Mítines este mes</span>
                    <span class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Puntos WA</span>
                    <span class="stat-value">0</span>
                </div>
            </div>

            <div class="athletes-section">
            <div class="section-bar">
                <h3>Lista de Representados</h3>
                <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                    <div class="filter-pills" id="gender-filters">
                        <span class="pill active" data-gender="all">Todos</span>
                        <span class="pill" data-gender="Man">Hombres</span>
                        <span class="pill" data-gender="Woman">Mujeres</span>
                    </div>
                    <select id="discipline-filter" class="custom-select">
                        <option value="all">Todas las pruebas</option>
                        </select>
                </div>
            </div>
            <div class="athlete-grid" id="athlete-grid"></div>
            </div>
        </main>
    </div>
</body>
</html>
