<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Manager | APEX ATHLETICS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">APEX<span>ATHLETICS</span></div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active"><i class="fas fa-user-friends"></i> Atletas</a>
                <a href="../index.html" class="nav-item"><i class="fas fa-search-location"></i> Buscar Mítines</a>
                <a href="#" class="nav-item"><i class="fas fa-file-signature"></i> Inscripciones</a>
                <a href="#" class="nav-item"><i class="fas fa-cog"></i> Ajustes</a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-pill">
                    <img src="https://ui-avatars.com/api/?name=Manager+Name&background=0070f3&color=fff" alt="Avatar">
                    <div class="user-info">
                        <span class="user-name">Serra Mng.</span>
                        <span class="user-role">Premium</span>
                    </div>
                    <i class="fas fa-sign-out-alt" id="logout-btn"></i>
                </div>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="view-header">
                <div class="header-text">
                    <h1>Gestión de Atletas</h1>
                    <p>Panel de control de representados</p>
                </div>
                <div class="header-actions">
                    <button class="btn-primary"><i class="fas fa-plus"></i> Añadir Atleta</button>
                </div>
            </header>

            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-label">Atletas Activos</span>
                    <span class="stat-value">12</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Mítines este mes</span>
                    <span class="stat-value">5</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Puntos World Athletics</span>
                    <span class="stat-value">14.2k</span>
                </div>
            </div>

            <div class="athletes-section">
                <div class="section-bar">
                    <h3>Lista de Representados</h3>
                    <div class="filter-pills">
                        <span class="pill active">Todos</span>
                        <span class="pill">Hombres</span>
                        <span class="pill">Mujeres</span>
                    </div>
                </div>
                <div class="athlete-grid" id="athlete-grid">
                    </div>
            </div>
        </main>
    </div>
</body>
</html>
