<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística y Viaje | APEX ATHLETICS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="travel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module" src="travels.js"></script>
</head>
<body>
    <div class="top-gradient"></div>
    <div class="travel-container">
        <header class="travel-header">
            <div class="header-content">
                <span class="header-tag">Centro de Logística</span>
                <h1 id="destination-title">Cargando...</h1>
            </div>
            <a href="../index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
        </header>

        <div class="grid-travel">
            <!-- BLOQUE MAPA / SEDE -->
            <div class="travel-card">
                <h3><i class="fas fa-map-marked-alt"></i> Sede del Evento</h3>
                <div class="map-container">
                    <iframe id="gmap-iframe" width="100%" height="100%" frameborder="0"></iframe>
                </div>

                <!-- BOTÓN Y DISTANCIA COCHE -->
                <div id="drive-info" class="drive-card" style="display: none; margin-top: 15px;">
                    <h3><i class="fas fa-car"></i> Viajar en coche</h3>
                    <div class="drive-content">
                        <div class="drive-label" id="drive-distance-text">Ruta recomendada</div>
                        <div class="drive-actions">
                            <button id="btn-drive-maps" class="btn-drive-compact">
                                <i class="fas fa-route"></i>
                                <span class="btn-text">Ver ruta en Maps</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- INFO AEROPUERTO → SEDE -->
                <div id="airport-to-event" style="margin-top: 15px;"></div>
            </div>

            <!-- BLOQUE AEROPUERTOS / FORM -->
            <div class="travel-card">
                <h3><i class="fas fa-plane"></i> Aeropuertos más cercanos:</h3>

                <!-- PASO 1: INGRESO CIUDAD -->
                <div id="step-1" class="setup-box">
                    <p>Introduce tu ciudad actual para calcular aeropuertos:</p>
                    <div class="input-group">
                        <input type="text" id="user-city-input" placeholder="Ej: Barcelona, Madrid...">
                        <button type="button" id="btn-configurar">Planificar Viaje</button>
                    </div>
                </div>

                <!-- PASO 2: SELECCIÓN DE AEROPUERTOS -->
                <div id="step-2" class="selection-area" style="display: none;">
                    <h4 class="selection-title">
                        Seleccione los aeropuertos para consultar vuelos:
                    </h4>

                    <div class="radar-wrapper">
                        <div class="radar-col">
                            <h5><i class="fas fa-plane-departure"></i> Origen (Cerca de ti)</h5>
                            <div id="origin-airports" class="airports-grid"></div>
                        </div>
                        <div class="radar-col">
                            <h5><i class="fas fa-plane-arrival"></i> Destino (Evento)</h5>
                            <div id="destination-airports" class="airports-grid"></div>
                        </div>
                    </div>

                    <!-- FORMULARIO FINAL -->
                    <form id="flight-form" class="final-form">
                        <div class="inputs-row">
                            <input type="text" id="origin-input" readonly placeholder="IATA Origen">
                            <input type="text" id="destination-input" readonly placeholder="IATA Destino">
                        </div>
                        <div class="inputs-row">
                            <input type="date" id="date-outbound" required>
                            <input type="date" id="date-return" required>
                        </div>
                        <button type="submit" class="btn-search-main">
                            <i class="fab fa-google"></i> Buscar vuelos en Google
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
